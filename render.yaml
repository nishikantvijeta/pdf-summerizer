services:
  - type: web
    name: ai-pdf-summarizer-api
    runtime: node
    rootDir: server
    plan: free
    healthCheckPath: /health
    buildCommand: npm install
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: CLIENT_ORIGIN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: MAX_UPLOAD_MB
        value: "10"
      - key: DOCUMENT_TTL_MINUTES
        value: "60"
